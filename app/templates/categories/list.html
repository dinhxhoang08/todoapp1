{% extends "base.html" %}
{% block title %}Categories - Todo App{% endblock %}
{% block content %}
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Categories</h2>
        <a href="/categories/new" class="btn btn-primary" hx-get="/categories/new" hx-target="#modal-container" hx-trigger="click" data-bs-toggle="modal" data-bs-target="#categoryModal">
            <i class="bi bi-plus-circle me-2"></i>New Category
        </a>
    </div>

    <div class="row g-3" id="category-list">
        {% include "categories/list_partial.html" %}
    </div>
</div>

<div class="modal fade" id="categoryModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content" id="modal-container">
            <div class="modal-body text-center py-5">
                <div class="spinner-border" role="status"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
