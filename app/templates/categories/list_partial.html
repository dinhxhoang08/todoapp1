{% if categories %}
{% for cat in categories %}
<div class="col-md-4">
    <div class="card shadow-sm" style="border-left: 4px solid {{ cat.color or '#6c757d' }}">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <h6 class="card-title mb-1">{{ cat.name }}</h6>
                    <span class="badge bg-light text-dark">{{ cat.task_count }} tasks</span>
                </div>
                <div class="btn-group btn-group-sm">
                    <button class="btn btn-outline-primary" hx-get="/categories/{{ cat.id }}/edit"
                            hx-target="#modal-container" data-bs-toggle="modal" data-bs-target="#categoryModal">
                        <i class="bi bi-pencil"></i>
                    </button>
                    <button class="btn btn-outline-danger" hx-delete="/categories/{{ cat.id }}"
                            hx-target="#category-list" hx-swap="outerHTML" hx-confirm="Delete category '{{ cat.name }}'?">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endfor %}
{% else %}
<div class="col-12 text-center py-5 text-muted">
    <i class="bi bi-folder display-4 d-block mb-3"></i>
    <p class="fs-5">No categories yet</p>
</div>
{% endif %}
