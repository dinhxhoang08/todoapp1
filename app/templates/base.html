<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Todo App{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    {% block head_extra %}{% endblock %}
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <nav class="sidebar d-flex flex-column flex-shrink-0 p-3" id="sidebar">
            <a href="/dashboard" class="sidebar-brand d-flex align-items-center mb-3 text-decoration-none">
                <i class="bi bi-check2-square me-2 fs-4"></i>
                <span class="fs-5 fw-semibold">Todo App</span>
            </a>
            <hr>
            <ul class="nav nav-pills flex-column mb-auto">
                <li class="nav-item">
                    <a href="/dashboard" class="nav-link {% if request.url.path == '/dashboard' %}active{% endif %}">
                        <i class="bi bi-speedometer2 me-2"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/tasks" class="nav-link {% if 'tasks' in request.url.path %}active{% endif %}">
                        <i class="bi bi-list-task me-2"></i> Tasks
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/categories" class="nav-link {% if 'categories' in request.url.path %}active{% endif %}">
                        <i class="bi bi-folder me-2"></i> Categories
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/tags" class="nav-link {% if 'tags' in request.url.path %}active{% endif %}">
                        <i class="bi bi-tags me-2"></i> Tags
                    </a>
                </li>
            </ul>
            <hr>
            <div class="dropdown">
                <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle" data-bs-toggle="dropdown">
                    <i class="bi bi-person-circle me-2 fs-5"></i>
                    <strong>{{ user.username if user else 'Guest' }}</strong>
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a href="/auth/profile" class="dropdown-item"><i class="bi bi-person me-2"></i>Profile</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <form action="/auth/logout" method="post">
                            <button class="dropdown-item" type="submit"><i class="bi bi-box-arrow-right me-2"></i>Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content flex-grow-1 p-4" id="main-content">
            <!-- Toast Container -->
            <div class="toast-container position-fixed top-0 end-0 p-3" id="toast-container"></div>

            {% if error %}
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                {{ error }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endif %}

            {% if success %}
            <div class="alert alert-success alert-dismissible fade show" role="alert">
                {{ success }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endif %}

            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Dark mode toggle -->
    <button id="dark-mode-toggle" class="btn btn-sm btn-outline-secondary position-fixed bottom-0 end-0 m-3">
        <i class="bi bi-moon-fill"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.12/dist/htmx.min.js"></script>
    <script src="/static/js/main.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
